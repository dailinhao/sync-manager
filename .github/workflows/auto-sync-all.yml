name: Auto Create and Sync Multiple Projects

on:
  workflow_dispatch:
  schedule:
    - cron: '*/10 * * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repo: 
          - dailinhao/dailinhao-project
          - dailinhao/dailinhao1-project    # 注意：不能用点，改成横线
          - dailinhao/dailinhao2-project    # 注意：不能用点，改成横线
    
    steps:
      - name: Checkout ${{ matrix.repo }}
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.repo }}
          token: ${{ secrets.GITHUB_TOKEN }}   # 改成这个
          fetch-depth: 0
      
      - name: Get Repo Name
        id: info
        run: |
          REPO_NAME=$(echo "${{ matrix.repo }}" | cut -d'/' -f2)
          echo "name=$REPO_NAME" >> $GITHUB_OUTPUT
      
      - name: Create GitLab Project if not exists
        env:
          GL_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GL_URL: ${{ secrets.GITLAB_URL }}
          GL_USER: ${{ secrets.GITLAB_USERNAME }}
          REPO_NAME: ${{ steps.info.outputs.name }}
        run: |
          echo "检查 GitLab 项目: $REPO_NAME"
          
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "PRIVATE-TOKEN: ${GL_TOKEN}" \
            "https://${GL_URL}/api/v4/projects/${GL_USER}%2F${REPO_NAME}")
          
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ 项目已存在"
          else
            echo "🆕 创建项目: $REPO_NAME"
            curl -s -X POST \
              -H "PRIVATE-TOKEN: ${GL_TOKEN}" \
              -H "Content-Type: application/json" \
              "https://${GL_URL}/api/v4/projects" \
              -d "{\"name\":\"${REPO_NAME}\",\"visibility\":\"private\",\"initialize_with_readme\":false}"
            sleep 5
          fi
      
      - name: Push to GitLab
        env:
          GL_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GL_URL: ${{ secrets.GITLAB_URL }}
          GL_USER: ${{ secrets.GITLAB_USERNAME }}
          REPO_NAME: ${{ steps.info.outputs.name }}
        run: |
          echo "🚀 推送到 GitLab: $REPO_NAME"
          
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          rm -rf .github
          git add -A
          git commit -m "Sync from GitHub" || true
          
          git remote add gitlab "https://oauth2:${GL_TOKEN}@${GL_URL}/${GL_USER}/${REPO_NAME}.git"
          git push gitlab --all --force
          git push gitlab --tags --force || true
          
          echo "✅ 完成: $REPO_NAME"
